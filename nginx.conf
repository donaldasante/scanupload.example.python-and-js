server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression for text-based assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml+rss;
    gzip_min_length 256;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://scanupload.python.example:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location /scanupload-api/ {
        proxy_pass http://scanupload.python.example:8080/scanupload-api/;
        proxy_set_header Host $host;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Essential Proxy Headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent nginx from silently closing idle WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering for real-time event delivery
        proxy_buffering off;
        proxy_cache off;        
    }
}
